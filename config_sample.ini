# Job Automation Agent Configuration
# Copy this file to config.ini and update with your settings

[linkedin]
email = your.email@example.com
password = your_password_here
cookies_file = cookies/linkedin_cookies.json

[search]
keywords = AI Engineer, Machine Learning Engineer, Data Scientist
location = United States
max_jobs_per_search = 50

[scoring]
min_match_score = 70.0
excellent_match_threshold = 90.0
strong_match_threshold = 75.0

[limits]
daily_application_limit = 10
rate_limit_delay = 2.0
max_concurrent_applications = 3

[safety]
dry_run = false
require_human_confirmation = true
blacklist_companies = 
blacklist_keywords = 

[paths]
resume_file = resumes/my_resume.pdf
cover_letter_template = templates/cover_letter.txt
data_directory = data

[llm]
provider = openai
model = gpt-4
api_key = your_openai_api_key_here

[browser]
headless = false
browser_type = chromium
user_agent = Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36

[logging]
level = INFO
file = logs/jobagent.log